<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>DMD Article</title>

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050505;
      color:white;
      font-family:Arial, sans-serif;
    }

    .article-container{
      width:90%;
      max-width:1100px;
      margin:60px auto;
    }

    .article-image{
      width:100%;
      height:520px;
      object-fit:cover;
      border-radius:24px;
      margin-bottom:50px;
    }

    .article-info{
      display:flex;
      gap:20px;
      margin-bottom:25px;
      color:#888;
      font-size:16px;
    }

    .article-title{
      font-size:72px;
      line-height:1.05;
      font-family:'Oswald', sans-serif;
      margin-bottom:35px;
    }

    .article-content{
      font-size:27px;
      line-height:1.9;
      color:#d5d5d5;
      margin-bottom:60px;
    }

    .back-btn{
      display:inline-block;
      padding:16px 34px;
      border:1px solid red;
      color:white;
      text-decoration:none;
      transition:0.3s;
      font-size:18px;
    }

    .back-btn:hover{
      background:red;
    }

    @media(max-width:768px){

      .article-container{
        width:92%;
        margin:30px auto;
      }

      .article-image{
        height:240px;
        border-radius:16px;
        margin-bottom:30px;
      }

      .article-title{
        font-size:42px;
        margin-bottom:20px;
      }

      .article-content{
        font-size:20px;
        line-height:1.7;
      }

      .article-info{
        flex-direction:column;
        gap:10px;
        font-size:14px;
      }

    }

  </style>
</head>

<body>

<div class="article-container" id="article"></div>

<script>

async function loadArticle(){

  const params = new URLSearchParams(window.location.search);

  const id = params.get("id");

  const res = await fetch(
    "https://facultynews-production.up.railway.app/news"
  );

  const news = await res.json();

  const article = news.find(item => item.id == id);

  if(!article){

    document.getElementById("article").innerHTML = `
      <h1>Article not found</h1>
    `;

    return;
  }

  const date = new Date(article.created_at);

  const formattedDate =
    date.toLocaleDateString("ru-RU");

  const randomViews =
    Math.floor(Math.random() * 900) + 100;

  document.getElementById("article").innerHTML = `

    <img
      class="article-image"
      src="${article.image}"
    >

    <div class="article-info">

      <span>
        Published: ${formattedDate}
      </span>

      <span>
        👁 ${randomViews} views
      </span>

    </div>

    <h1 class="article-title">
      ${article.title}
    </h1>

    <div class="article-content">
      ${article.content}
    </div>

    <a href="index.html" class="back-btn">
      ← Back to News
    </a>

  `;
}

loadArticle();

</script>

</body>
</html>
