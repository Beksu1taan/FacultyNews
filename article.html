<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Article</title>

  <link rel="stylesheet" href="style.css">

  <style>

body{
  margin:0;
  background:#050505;
  color:white;
  font-family:Arial, sans-serif;
}

.article-page{
  width:90%;
  max-width:900px;
  margin:60px auto;
}

.article-page img{
  width:100%;
  height:420px;
  object-fit:cover;
  border-radius:20px;
  margin-bottom:40px;
}

.article-page h1{
  font-size:64px;
  line-height:1.1;
  margin-bottom:30px;
  font-weight:800;
}

.article-page p{
  font-size:24px;
  line-height:1.9;
  color:#cfcfcf;
}

.back-btn{
  display:inline-block;
  margin-top:50px;
  padding:14px 28px;
  border:1px solid red;
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.back-btn:hover{
  background:red;
}

@media(max-width:768px){

  .article-page{
    width:92%;
    margin:40px auto;
  }

  .article-page img{
    height:240px;
    border-radius:14px;
  }

  .article-page h1{
    font-size:38px;
  }

  .article-page p{
    font-size:19px;
    line-height:1.7;
  }

}

</style>
</head>

<body>

<div class="article-page" id="article"></div>

<script>

async function loadArticle(){

  const params = new URLSearchParams(window.location.search);

  const id = params.get("id");

  const res = await fetch("https://facultynews-production.up.railway.app/news");

  const news = await res.json();

  const article = news.find(item => item.id == id);

  if(!article){
    document.getElementById("article").innerHTML = "<h1>Article not found</h1>";
    return;
  }

  document.getElementById("article").innerHTML = `
  
    <img src="${article.image}">

    <h1>${article.title}</h1>

    <p>${article.content}</p>

    <a href="index.html" class="back-btn">
      ← Back
    </a>
  
  `;
}

loadArticle();

</script>

</body>
</html>
