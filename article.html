<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>DMD Article</title>

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap"
        rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050505;
      color:white;
      font-family:Arial,sans-serif;
    }

    .article-container{
      width:90%;
      max-width:1000px;
      margin:50px auto;
    }

    .article-image{
      width:100%;
      height:450px;
      object-fit:cover;
      border-radius:24px;
      margin-bottom:35px;
    }

    .article-info{
      display:flex;
      gap:25px;
      color:#888;
      margin-bottom:20px;
      font-size:15px;
    }

    .article-title{
      font-size:64px;
      line-height:1.05;
      margin-bottom:30px;
      font-family:'Oswald',sans-serif;
    }

    .article-content{
      font-size:24px;
      line-height:1.9;
      color:#d0d0d0;
      margin-bottom:50px;
    }

    .back-btn{
      display:inline-block;
      padding:15px 30px;
      border:1px solid red;
      color:white;
      text-decoration:none;
      transition:0.3s;
    }

    .back-btn:hover{
      background:red;
    }

    @media(max-width:768px){

      .article-container{
        width:92%;
        margin:30px auto;
      }

      .article-image{
        height:240px;
        border-radius:16px;
      }

      .article-title{
        font-size:42px;
      }

      .article-content{
        font-size:19px;
        line-height:1.7;
      }

      .article-info{
        flex-direction:column;
        gap:8px;
      }

    }

  </style>
</head>

<body>

<div class="article-container" id="article"></div>

<script>

async function loadArticle(){

  const params =
    new URLSearchParams(window.location.search);

  const id = params.get("id");

  await fetch(
    `https://facultynews-production.up.railway.app/view/${id}`,
    {
      method:"POST"
    }
  );

  const res = await fetch(
    "https://facultynews-production.up.railway.app/news"
  );

  const news = await res.json();

  const article =
    news.find(item => item.id == id);

  if(!article){

    document.getElementById("article").innerHTML =
      "<h1>Article not found</h1>";

    return;
  }

  const date =
    new Date(article.created_at);

  const formattedDate =
    date.toLocaleDateString("ru-RU");

  document.getElementById("article").innerHTML = `

    <img
      class="article-image"
      src="${article.image}"
    >

    <div class="article-info">

      <span>
        📅 ${formattedDate}
      </span>

      <span>
        👁 ${article.views} views
      </span>

    </div>

    <h1 class="article-title">
      ${article.title}
    </h1>

    <div class="article-content">
      ${article.content}
    </div>

    <a href="index.html" class="back-btn">
      ← Back to News
    </a>

  `;
}

loadArticle();

</script>

</body>
</html>
