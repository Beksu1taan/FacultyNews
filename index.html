<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>DMD News</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Playfair+Display&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="top-bar">
NEWS — EVENTS — INTERVIEWS — COMMUNITY —
</div>

<section class="hero">
  <h1>DMD News</h1>
</section>

<section class="text">
  <h2>WE CREATE STORIES</h2>
  <p>Новости, интервью и события, которые формируют студенческую жизнь</p>
</section>

<section class="cards">

  <div class="card">
    <img src="students-lecture.jpg">
    <h3>NEWS</h3>
  </div>

  <div class="card">
    <img src="students-life.jpg">
    <h3>INTERVIEWS</h3>
  </div>

  <div class="card">
    <img src="narxoz-building.jpg">
    <h3>EVENTS</h3>
  </div>

</section>

<section class="numbers">
  <div>+1K<br><span>Students</span></div>
  <div>+50<br><span>Events</span></div>
  <div>+40<br><span>Articles</span></div>
</section>

<section class="news">

  <h2>Latest News</h2>

  <div class="news-grid" id="newsGrid"></div>

</section>

<section class="form">

  <h2>Stay Updated</h2>

  <input id="name" placeholder="Your Name">
  <input id="course" placeholder="Course">
  <input id="email" placeholder="Email">

  <button onclick="sendForm()">Subscribe</button>

</section>

<section class="social">

  <a href="https://www.instagram.com/newsdmd" target="_blank" class="social-card insta">
    <i class="fab fa-instagram"></i>
  </a>

  <a href="https://t.me/dmd_narxoz" target="_blank" class="social-card telegram">
    <i class="fab fa-telegram-plane"></i>
  </a>

</section>

<script src="script.js"></script>

</html>
